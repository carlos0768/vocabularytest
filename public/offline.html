<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#137fec" />
  <title>オフライン - MERKEN</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #0f172a;
      --muted: #64748b;
      --primary: #137fec;
      --card: #f8fafc;
      --border: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --fg: #e2e8f0;
        --muted: #94a3b8;
        --primary: #4aa3ff;
        --card: #111a2e;
        --border: #1e293b;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
        "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .badge {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px;
    }
    p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 24px;
    }
    button {
      appearance: none;
      border: none;
      cursor: pointer;
      background: var(--primary);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 24px;
      border-radius: 999px;
      width: 100%;
      max-width: 240px;
      transition: opacity 0.15s ease;
    }
    button:active { opacity: 0.8; }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>オフラインです</h1>
    <p>
      インターネットに接続されていません。<br />
      保存済みの単語帳やクイズはオフラインでも利用できます。接続が回復すると自動的に同期されます。
    </p>
    <button type="button" onclick="location.reload()">再読み込み</button>
    <div class="status" id="status" role="status" aria-live="polite"></div>
  </main>
  <script>
    (function () {
      var status = document.getElementById('status');
      // navigator.onLine only reports whether a network interface is up, NOT whether
      // the server is actually reachable. It stays true on captive-portal Wi-Fi, an
      // ISP outage with the router still up, or weak cellular. Reloading purely on
      // that flag would loop forever: the reload re-requests the same route, the
      // service worker re-serves this page, and the script reloads again.
      //
      // So we react only to the 'online' TRANSITION event, which fires at most once
      // per reconnect. Even if the origin is still unreachable right after it fires,
      // the resulting reload just shows this page again and then stops (no further
      // 'online' events while the OS considers us online) — never a loop. Manual
      // retries go through the button.
      var reloaded = false;
      window.addEventListener('online', function () {
        if (reloaded) return;
        reloaded = true;
        if (status) status.textContent = '接続を確認しました。読み込み中…';
        location.reload();
      });
    })();
  </script>
</body>
</html>
