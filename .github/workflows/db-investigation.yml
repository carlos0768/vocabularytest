name: DB Investigation on Push

on:
  push:
    branches: [main]

jobs:
  investigate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files with patches
        id: changes
        run: |
          # Get changed files between HEAD~1 and HEAD, save to temp file
          git diff HEAD~1 HEAD --name-status --diff-filter=ADMR | while IFS=$'\t' read -r status file; do
            case "$status" in
              A) change_type="added" ;;
              D) change_type="removed" ;;
              M) change_type="modified" ;;
              R*) change_type="renamed" ;;
              *) change_type="modified" ;;
            esac
            patch=$(git diff HEAD~1 HEAD -- "$file" 2>/dev/null | head -c 2000 | jq -Rs .)
            echo "{\"path\":\"$file\",\"changeType\":\"$change_type\",\"patch\":$patch}"
          done | jq -s . > /tmp/changed_files.json

          FILE_COUNT=$(jq length /tmp/changed_files.json)
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $FILE_COUNT changed files"

      - name: Call DB Investigation endpoint
        id: investigate
        if: steps.changes.outputs.file_count != '0'
        env:
          WEBHOOK_TOKEN: ${{ secrets.DB_INVESTIGATION_WEBHOOK_TOKEN }}
          CLOUD_RUN_URL: ${{ secrets.DB_INVESTIGATION_URL }}
        run: |
          # Build payload using temp file to avoid shell escaping issues
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            --arg actor "${{ github.actor }}" \
            --arg triggered "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile files /tmp/changed_files.json \
            '{
              repository: $repo,
              commitSha: $sha,
              actor: $actor,
              triggeredAt: $triggered,
              source: "github-actions",
              changedFiles: $files[0]
            }' > /tmp/payload.json

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${CLOUD_RUN_URL}/investigate" \
            -H "Authorization: Bearer ${WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            --max-time 120)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          # Save response for next step
          echo "$BODY" > /tmp/response.json

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::DB Investigation returned HTTP $HTTP_CODE"
          fi

          SKIPPED=$(echo "$BODY" | jq -r '.skipped // false' 2>/dev/null)
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"

          if [ "$SKIPPED" = "true" ]; then
            echo "✅ No DB-related changes detected, investigation skipped"
          else
            RISK=$(echo "$BODY" | jq -r '.assessment.riskLevel // "unknown"' 2>/dev/null)
            SCORE=$(echo "$BODY" | jq -r '.assessment.riskScore // "?"' 2>/dev/null)
            echo "🔍 Risk Level: $RISK (score: $SCORE)"
          fi

      - name: Notify Slack
        if: steps.investigate.outputs.skipped == 'false'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          BODY=$(cat /tmp/response.json)

          RISK=$(echo "$BODY" | jq -r '.assessment.riskLevel // "unknown"')
          SCORE=$(echo "$BODY" | jq -r '.assessment.riskScore // "?"')
          SUMMARY=$(echo "$BODY" | jq -r '.assessment.summary // ""')
          NOTION_WRITTEN=$(echo "$BODY" | jq -r '.notion.written // false')
          DB_FILES=$(echo "$BODY" | jq -r '(.detection.matches // []) | map(.path) | unique | join(", ")')

          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          # Risk level emoji
          case "$RISK" in
            critical) EMOJI="🔴" ;;
            high)     EMOJI="🟠" ;;
            medium)   EMOJI="🟡" ;;
            low)      EMOJI="🟢" ;;
            *)        EMOJI="⚪" ;;
          esac

          NOTION_LINE=""
          if [ "$NOTION_WRITTEN" = "true" ]; then
            NOTION_LINE="\n📝 Notion: 記録済み"
          fi

          TEXT="${EMOJI} *DB Investigation* — Risk: *${RISK}* (score: ${SCORE})\nCommit: \`${SHORT_SHA}\` by ${{ github.actor }}\nFiles: ${DB_FILES}${NOTION_LINE}\n\n${SUMMARY}"

          jq -n --arg text "$TEXT" '{ text: $text }' | \
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-

          echo "✅ Slack notification sent"
