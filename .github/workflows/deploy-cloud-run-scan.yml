name: Deploy Cloud Run Scan Gateway

on:
  push:
    branches: [main]
    paths:
      - 'cloud-run-scan/**'
      - '.github/workflows/deploy-cloud-run-scan.yml'
  workflow_dispatch:

env:
  GCP_REGION: asia-northeast1
  SERVICE_NAME: scanvocab-ai-gateway
  ARTIFACT_REPOSITORY: cloud-run-scan
  IMAGE_NAME: scan-gateway
  OPENAI_SECRET_NAME: scan-openai-api-key
  FALLBACK_SLACK_WEBHOOK_SECRET_NAME: scan-fallback-slack-webhook-url
  FALLBACK_OPENAI_MODEL: gpt-4o-mini
  FALLBACK_CALLS_DAILY_CAP: "100"
  FALLBACK_COST_DAILY_CAP_YEN: "300"
  FALLBACK_ESTIMATED_YEN_PER_CALL: "3"
  FALLBACK_BREAKER_OPEN_MS: "300000"
  GATEWAY_COST_DAILY_CAP_YEN: "900"
  GATEWAY_FIRESTORE_GUARD_ENABLED: "true"
  GATEWAY_FIRESTORE_GUARD_FAIL_CLOSED: "true"
  GATEWAY_GUARD_STATE_DOC: ops/aiGatewayGuard
  GATEWAY_USD_TO_JPY_RATE: "155"
  GATEWAY_FLAT_FALLBACK_USD: "0.05"
  GATEWAY_USAGE_MISSING_CALLS_DAILY_CAP: "0"
  GATEWAY_BLOCK_UNPRICED_MODELS: "false"
  CLOUD_RUN_MAX_INSTANCES: "3"
  CLOUD_RUN_MIN_INSTANCES: "0"
  CLOUD_RUN_CONCURRENCY: "10"
  CLOUD_RUN_TIMEOUT: "300"
  CLOUD_RUN_CPU: "1"
  CLOUD_RUN_MEMORY: "1Gi"
  APP_ENV: prod

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cloud-run-scan dependencies
        run: npm ci --prefix cloud-run-scan

      - name: Run cloud-run-scan tests
        run: npm run test --prefix cloud-run-scan

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${{ env.ARTIFACT_REPOSITORY }}" \
            --location "${{ env.GCP_REGION }}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${{ env.ARTIFACT_REPOSITORY }}" \
            --repository-format=docker \
            --location="${{ env.GCP_REGION }}" \
            --description="Container images for scan gateway"

      - name: Build and push image
        env:
          PROJECT_ID: ${{ steps.auth.outputs.project_id }}
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA}"
          BUILD_ID=$(gcloud builds submit cloud-run-scan --tag "${IMAGE_URI}" --async --format='value(id)')
          echo "Cloud Build ID: ${BUILD_ID}"
          for i in {1..120}; do
            STATUS=$(gcloud builds describe "${BUILD_ID}" --format='value(status)')
            echo "Cloud Build status: ${STATUS}"
            case "${STATUS}" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Cloud Build failed with status ${STATUS}"
                exit 1
                ;;
            esac
            sleep 5
          done

          FINAL_STATUS=$(gcloud builds describe "${BUILD_ID}" --format='value(status)')
          if [ "${FINAL_STATUS}" != "SUCCESS" ]; then
            echo "Cloud Build did not finish in time: ${FINAL_STATUS}"
            exit 1
          fi
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run service
        env:
          PROJECT_ID: ${{ steps.auth.outputs.project_id }}
        run: |
          gcloud secrets versions access latest --secret "${{ env.OPENAI_SECRET_NAME }}" >/dev/null 2>&1 || {
            echo "Missing required secret: ${{ env.OPENAI_SECRET_NAME }}"
            exit 1
          }

          SECRET_FLAGS="AUTH_TOKEN=scan-gateway-auth-token:latest,OPENAI_API_KEY=${{ env.OPENAI_SECRET_NAME }}:latest"
          if gcloud secrets versions access latest --secret "${{ env.FALLBACK_SLACK_WEBHOOK_SECRET_NAME }}" >/dev/null 2>&1; then
            SECRET_FLAGS="${SECRET_FLAGS},FALLBACK_SLACK_WEBHOOK_URL=${{ env.FALLBACK_SLACK_WEBHOOK_SECRET_NAME }}:latest"
          else
            echo "Optional secret not found: ${{ env.FALLBACK_SLACK_WEBHOOK_SECRET_NAME }} (continuing without Slack fallback notifications)"
          fi

          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${IMAGE_URI}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${{ env.GCP_REGION }},APP_ENV=${{ env.APP_ENV }},FALLBACK_OPENAI_MODEL=${{ env.FALLBACK_OPENAI_MODEL }},FALLBACK_CALLS_DAILY_CAP=${{ env.FALLBACK_CALLS_DAILY_CAP }},FALLBACK_COST_DAILY_CAP_YEN=${{ env.FALLBACK_COST_DAILY_CAP_YEN }},FALLBACK_ESTIMATED_YEN_PER_CALL=${{ env.FALLBACK_ESTIMATED_YEN_PER_CALL }},FALLBACK_BREAKER_OPEN_MS=${{ env.FALLBACK_BREAKER_OPEN_MS }},GATEWAY_COST_DAILY_CAP_YEN=${{ env.GATEWAY_COST_DAILY_CAP_YEN }},GATEWAY_FIRESTORE_GUARD_ENABLED=${{ env.GATEWAY_FIRESTORE_GUARD_ENABLED }},GATEWAY_FIRESTORE_GUARD_FAIL_CLOSED=${{ env.GATEWAY_FIRESTORE_GUARD_FAIL_CLOSED }},GATEWAY_GUARD_STATE_DOC=${{ env.GATEWAY_GUARD_STATE_DOC }},GATEWAY_USD_TO_JPY_RATE=${{ env.GATEWAY_USD_TO_JPY_RATE }},GATEWAY_FLAT_FALLBACK_USD=${{ env.GATEWAY_FLAT_FALLBACK_USD }},GATEWAY_USAGE_MISSING_CALLS_DAILY_CAP=${{ env.GATEWAY_USAGE_MISSING_CALLS_DAILY_CAP }},GATEWAY_BLOCK_UNPRICED_MODELS=${{ env.GATEWAY_BLOCK_UNPRICED_MODELS }}" \
            --set-secrets "${SECRET_FLAGS}" \
            --max-instances "${{ env.CLOUD_RUN_MAX_INSTANCES }}" \
            --min-instances "${{ env.CLOUD_RUN_MIN_INSTANCES }}" \
            --concurrency "${{ env.CLOUD_RUN_CONCURRENCY }}" \
            --timeout "${{ env.CLOUD_RUN_TIMEOUT }}" \
            --cpu "${{ env.CLOUD_RUN_CPU }}" \
            --memory "${{ env.CLOUD_RUN_MEMORY }}" \
            --cpu-throttling

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.GCP_REGION }}" --format='value(status.url)')
          echo "Deployed URL: ${URL}"
