name: iOS Deploy → Install Notification

on:
  deployment_status:

jobs:
  notify-ios:
    if: >-
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment.ref, 'ios')
    runs-on: ubuntu-latest
    steps:
      - name: Notify iOS channel
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "channel": "C0AMSTQ19UZ",
              "text": "<@D0ANXAG92BA> 実機にインストール\nブランチ: `'"${{ github.event.deployment.ref }}"'`\nCommit: `'"${{ github.sha }}"'`\nPreview: '"${{ github.event.deployment_status.target_url || 'N/A' }}"'"
            }'
