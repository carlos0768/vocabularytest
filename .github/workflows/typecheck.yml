name: Typecheck

# `next build` は型チェックをスキップして高速化しているため、
# 型安全性は専用の tsc --noEmit ジョブでCIとして担保する。
on:
  pull_request:
  push:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
